<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <span class="logo-icon"></span>
                    <h1>Nequi Sin Caidas</h1>
                </div>
                <p class="login-subtitle">Controla tu dinero</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="text" id="username" name="username" placeholder="Ingresa tu usuario">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña">
                    </div>
                </div>

                <a href="dashboard.html" class="login-btn">Ingresar</a>
            </form>

            <p class="login-footer">© 2026 Finanzas - Todos los derechos reservados</p>
        </div>
    </div>
</body>

</html>

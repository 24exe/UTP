<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parcial - Computación Gráfica</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="ventana">

    <!-- Barra de navegación superior -->
    <nav class="navbar">
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
    </nav>

    <!-- Contenido principal -->
    <div class="contenido">

      <!-- Columna izquierda -->
      <div class="columna columna-izq">

        <!-- Fila 1: Rectángulo rojo sólido -->
        <div class="celda">
          <div class="rect-rojo"></div>
        </div>

        <!-- Fila 2: Cuadrado dorado con borde blanco y cuadrado rojo dentro -->
        <div class="celda">
          <div class="rect-dorado">
            <div class="rect-dorado-inner"></div>
          </div>
        </div>

        <!-- Fila 3: Rectángulo naranja + líneas horizontales -->
        <div class="celda celda-lista">
          <div class="rect-naranja-pequeno"></div>
          <div class="lineas">
            <div class="linea linea-naranja"></div>
            <div class="linea linea-rosa"></div>
            <div class="linea linea-rosa"></div>
          </div>
        </div>

      </div>

      <!-- Columna central -->
      <div class="columna columna-centro">

        <!-- Fila 1: Cuadrado verde con diamante teal y rombo naranja dentro -->
        <div class="celda">
          <div class="rect-verde-centro">
            <div class="diamante-teal">
              <div class="rombo-naranja"></div>
            </div>
          </div>
        </div>

        <!-- Fila 2: Círculo morado oscuro -->
        <div class="celda">
          <div class="circulo-morado"></div>
        </div>

        <!-- Fila 3: Cuadrado teal con borde blanco y cuadrado teal claro dentro -->
        <div class="celda">
          <div class="rect-teal">
            <div class="rect-teal-inner"></div>
          </div>
        </div>

      </div>

      <!-- Columna derecha -->
      <div class="columna columna-der">

        <!-- Fila 1: Rectángulo verde sage sólido -->
        <div class="celda">
          <div class="rect-verde-der"></div>
        </div>

        <!-- Fila 2: Círculo naranja -->
        <div class="celda">
          <div class="circulo-naranja"></div>
        </div>

        <!-- Fila 3: Cuadrado verde sage con borde blanco y cuadrado verde dentro -->
        <div class="celda">
          <div class="rect-sage">
            <div class="rect-sage-inner"></div>
          </div>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
